# fly.io app config — https://fly.io/docs/reference/configuration/

app = "agentic-patterns-chat"
primary_region = "iad"

[build]

[env]
  CHAT_DATA_DIR = "/data/chat"
  NEMOTRON_MODEL = "nvidia/llama-3.1-nemotron-70b-instruct"
  NVIDIA_BASE_URL = "https://integrate.api.nvidia.com/v1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "chat_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
