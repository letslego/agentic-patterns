# fly.io app config — https://fly.io/docs/reference/configuration/

app = "agentic-patterns-chat"
primary_region = "iad"

[build]

[env]
  CHAT_DATA_DIR = "/data/chat"
  # Chat LLM via OpenRouter (set OPENROUTER_API_KEY secret); NVIDIA vars kept as fallback
  OPENROUTER_MODEL = "nvidia/llama-3.3-nemotron-super-49b-v1"
  OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[mounts]
  source = "chat_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
