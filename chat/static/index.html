<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Patterns Chat</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <h1>Agentic Patterns</h1>
        <p>Ask about all 21 design patterns</p>
      </header>
      <div class="pattern-list" id="pattern-list"></div>
      <button class="clear-btn" id="clear-filter" hidden>Clear filter</button>
    </aside>
    <main class="chat">
      <header class="chat-header">
        <button class="menu-btn" id="menu-btn" aria-label="Toggle patterns">☰</button>
        <div>
          <h2 id="chat-title">Pattern Assistant</h2>
          <p class="subtitle" id="status-line">Loading…</p>
        </div>
      </header>
      <div class="messages" id="messages"></div>
      <form class="composer" id="composer">
        <textarea id="input" rows="2" placeholder="Ask for a code recipe, explanation, or comparison…" required></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
