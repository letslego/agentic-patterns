<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Memory management pattern">
  <rect width="720" height="220" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Memory Management</text>
  <rect x="60" y="60" width="180" height="100" rx="12" fill="#172554" stroke="#3b82f6"/>
  <text x="150" y="88" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Short-Term</text>
  <text x="150" y="108" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Recent turns (bounded)</text>
  <text x="150" y="128" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">deque / sliding window</text>
  <rect x="480" y="60" width="180" height="100" rx="12" fill="#14532d" stroke="#22c55e"/>
  <text x="570" y="88" fill="#bbf7d0" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Long-Term</text>
  <text x="570" y="108" fill="#86efac" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Vetted facts &amp; prefs</text>
  <text x="570" y="128" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">vector store / KV</text>
  <rect x="280" y="80" width="160" height="60" rx="12" fill="#2563eb"/>
  <text x="360" y="108" fill="#fff" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Agent Core</text>
  <text x="360" y="126" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Context assembly</text>
  <line x1="240" y1="110" x2="278" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="442" y1="110" x2="478" y2="110" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="198" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Retrieve relevant memory before each generation step</text>
</svg>
