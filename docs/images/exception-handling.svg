<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Exception handling pattern">
  <rect width="720" height="200" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Exception Handling &amp; Recovery</text>
  <rect x="60" y="70" width="100" height="44" rx="10" fill="#334155"/>
  <text x="110" y="98" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Call Tool</text>
  <polygon points="168,92 188,92 188,82 208,92 188,102 188,92" fill="#94a3b8"/>
  <rect x="218" y="70" width="100" height="44" rx="10" fill="#b45309" stroke="#fbbf24"/>
  <text x="268" y="98" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Error?</text>
  <polygon points="326,92 346,92 346,82 366,92 346,102 346,92" fill="#94a3b8"/>
  <rect x="376" y="55" width="110" height="44" rx="10" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="431" y="82" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Retry w/ backoff</text>
  <rect x="376" y="108" width="110" height="44" rx="10" fill="#7f1d1d" stroke="#f87171"/>
  <text x="431" y="136" fill="#fecaca" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Fallback path</text>
  <rect x="540" y="70" width="120" height="44" rx="10" fill="#065f46" stroke="#34d399"/>
  <text x="600" y="98" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Success</text>
  <line x1="486" y1="77" x2="538" y2="85" stroke="#64748b" stroke-width="2"/>
  <line x1="486" y1="130" x2="538" y2="100" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="178" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Classify retryable errors; circuit-break repeated failures</text>
</svg>
