<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Exploration pattern">
  <rect width="720" height="220" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Exploration &amp; Discovery</text>
  <rect x="300" y="48" width="120" height="44" rx="10" fill="#334155" stroke="#94a3b8"/>
  <text x="360" y="76" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Problem</text>
  <line x1="360" y1="92" x2="360" y2="108" stroke="#64748b" stroke-width="2"/>
  <line x1="120" y1="108" x2="600" y2="108" stroke="#64748b" stroke-width="2"/>
  <line x1="120" y1="108" x2="120" y2="118" stroke="#64748b" stroke-width="2"/>
  <line x1="360" y1="108" x2="360" y2="118" stroke="#64748b" stroke-width="2"/>
  <line x1="600" y1="108" x2="600" y2="118" stroke="#64748b" stroke-width="2"/>
  <rect x="60" y="118" width="120" height="50" rx="10" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="120" y="140" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Hypothesis A</text>
  <text x="120" y="156" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">conf 0.42</text>
  <rect x="300" y="118" width="120" height="50" rx="10" fill="#065f46" stroke="#34d399" stroke-width="2"/>
  <text x="360" y="140" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Hypothesis B</text>
  <text x="360" y="156" fill="#bbf7d0" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">conf 0.71 </text>
  <rect x="540" y="118" width="120" height="50" rx="10" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="600" y="140" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Hypothesis C</text>
  <text x="600" y="156" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">conf 0.55</text>
  <text x="360" y="198" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Generate candidates, gather evidence, select best explanation</text>
