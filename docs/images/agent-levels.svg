<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Agent complexity levels">
  <rect width="720" height="200" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Agent Capability Levels</text>
  <rect x="30" y="60" width="150" height="110" rx="12" fill="#1e293b" stroke="#64748b"/>
  <text x="105" y="88" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Level 0</text>
  <text x="105" y="108" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">LLM only</text>
  <text x="105" y="128" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">No tools / memory</text>
  <rect x="200" y="50" width="150" height="120" rx="12" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="275" y="82" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Level 1</text>
  <text x="275" y="102" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Tool use</text>
  <text x="275" y="122" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Search, APIs, RAG</text>
  <rect x="370" y="40" width="150" height="130" rx="12" fill="#065f46" stroke="#34d399"/>
  <text x="445" y="78" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Level 2</text>
  <text x="445" y="98" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Planning + memory</text>
  <text x="445" y="118" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Context engineering</text>
  <rect x="540" y="30" width="150" height="140" rx="12" fill="#581c87" stroke="#c084fc"/>
  <text x="615" y="72" fill="#f3e8ff" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Level 3</text>
  <text x="615" y="92" fill="#e9d5ff" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Multi-agent teams</text>
  <text x="615" y="112" fill="#d8b4fe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Coordination + A2A</text>
</svg>
