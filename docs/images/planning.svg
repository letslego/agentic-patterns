<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Planning pattern">
  <rect width="720" height="200" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Planning Pattern</text>
  <rect x="40" y="60" width="120" height="44" rx="10" fill="#581c87" stroke="#c084fc"/>
  <text x="100" y="88" fill="#f3e8ff" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Goal</text>
  <polygon points="168,82 188,82 188,72 208,82 188,92 188,82" fill="#94a3b8"/>
  <rect x="218" y="52" width="140" height="60" rx="10" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="288" y="78" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Decompose</text>
  <text x="288" y="96" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Step 1..N</text>
  <polygon points="366,82 386,82 386,72 406,82 386,92 386,82" fill="#94a3b8"/>
  <rect x="416" y="48" width="260" height="68" rx="10" fill="#1e293b" stroke="#64748b"/>
  <text x="446" y="72" fill="#22c55e" font-family="system-ui,sans-serif" font-size="11"> Step 1</text>
  <text x="446" y="90" fill="#22c55e" font-family="system-ui,sans-serif" font-size="11"> Step 2</text>
  <text x="446" y="108" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">� Step 3</text>
  <text x="560" y="90" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Execute &amp; track</text>
  <text x="360" y="168" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Re-plan when tools fail or context changes</text>
</svg>
