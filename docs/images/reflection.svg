<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Reflection pattern">
  <rect width="720" height="200" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Reflection Loop</text>
  <rect x="40" y="70" width="110" height="50" rx="10" fill="#2563eb"/>
  <text x="95" y="92" fill="#fff" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Draft</text>
  <text x="95" y="108" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Generate</text>
  <polygon points="158,95 178,95 178,85 198,95 178,105 178,95" fill="#94a3b8"/>
  <rect x="208" y="70" width="110" height="50" rx="10" fill="#b45309" stroke="#fbbf24"/>
  <text x="263" y="92" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Critique</text>
  <text x="263" y="108" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Review</text>
  <polygon points="326,95 346,95 346,85 366,95 346,105 346,95" fill="#94a3b8"/>
  <rect x="376" y="70" width="110" height="50" rx="10" fill="#7c3aed"/>
  <text x="431" y="92" fill="#fff" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Revise</text>
  <text x="431" y="108" fill="#ede9fe" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Improve</text>
  <path d="M486 95 H560" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="560" y="70" width="120" height="50" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="100" fill="#bbf7d0" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Final Output</text>
  <path d="M431 120 Q431 155 263 155 Q95 155 95 120" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="263" y="172" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Repeat until quality threshold</text>
</svg>
