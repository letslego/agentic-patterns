  <text x="640" y="112" fill="#ede9fe" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Grounded answer</text>
  <polygon points="180,95 210,95 210,85 230,95 210,105 210,95" fill="#94a3b8"/>
  <polygon points="380,95 410,95 410,85 430,95 410,105 410,95" fill="#94a3b8"/>
  <polygon points="540,95 570,95 570,85 590,95 570,105 570,95" fill="#94a3b8"/>
  <rect x="250" y="160" width="220" height="40" rx="8" fill="#172554" stroke="#3b82f6"/>
  <text x="360" y="186" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Context window = query + top-k documents</text>
