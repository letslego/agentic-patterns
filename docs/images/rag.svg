<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="RAG architecture">
  <rect width="720" height="220" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Retrieval-Augmented Generation (RAG)</text>
  <rect x="40" y="70" width="140" height="50" rx="10" fill="#334155"/>
  <text x="110" y="100" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">User Query</text>
  <rect x="220" y="60" width="160" height="70" rx="10" fill="#0f766e" stroke="#2dd4bf"/>
  <text x="300" y="92" fill="#ccfbf1" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Retriever</text>
  <text x="300" y="112" fill="#99f6e4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Vector / keyword search</text>
  <rect x="420" y="60" width="120" height="70" rx="10" fill="#1e293b" stroke="#64748b"/>
