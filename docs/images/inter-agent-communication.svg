<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Inter-agent communication pattern">
  <rect width="720" height="220" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Inter-Agent Communication (A2A)</text>
  <rect x="280" y="90" width="160" height="60" rx="12" fill="#334155" stroke="#94a3b8"/>
  <text x="360" y="118" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Event Broker</text>
  <text x="360" y="136" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">pub / sub bus</text>
  <rect x="60" y="50" width="120" height="44" rx="10" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="120" y="78" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Agent A</text>
  <rect x="60" y="150" width="120" height="44" rx="10" fill="#581c87" stroke="#c084fc"/>
  <text x="120" y="178" fill="#f3e8ff" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Agent C</text>
  <rect x="540" y="100" width="120" height="44" rx="10" fill="#065f46" stroke="#34d399"/>
  <text x="600" y="128" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Agent B</text>
  <line x1="180" y1="72" x2="278" y2="105" stroke="#64748b" stroke-width="2"/>
  <line x1="180" y1="172" x2="278" y2="135" stroke="#64748b" stroke-width="2"/>
  <line x1="442" y1="122" x2="538" y2="122" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="205" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Typed messages with correlation IDs across agent boundaries</text>
</svg>
