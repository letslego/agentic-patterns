<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Human in the loop pattern">
  <rect width="720" height="200" fill="#0f172a"/>
  <text x="360" y="28" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">Human-in-the-Loop</text>
  <rect x="50" y="75" width="130" height="50" rx="10" fill="#2563eb"/>
  <text x="115" y="105" fill="#fff" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Agent Proposal</text>
  <polygon points="188,100 208,100 208,90 228,100 208,110 208,100" fill="#94a3b8"/>
  <rect x="238" y="75" width="130" height="50" rx="10" fill="#b45309" stroke="#fbbf24"/>
  <text x="303" y="98" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Human Review</text>
  <text x="303" y="114" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Approve / Deny</text>
  <polygon points="376,100 396,100 396,90 416,100 396,110 396,100" fill="#94a3b8"/>
  <rect x="426" y="60" width="120" height="40" rx="10" fill="#065f46" stroke="#34d399"/>
  <text x="486" y="85" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Execute Action</text>
  <rect x="426" y="110" width="120" height="40" rx="10" fill="#7f1d1d" stroke="#f87171"/>
  <text x="486" y="135" fill="#fecaca" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Block Action</text>
  <circle cx="620" cy="100" r="28" fill="#1e293b" stroke="#94a3b8"/>
  <text x="620" y="105" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Audit</text>
  <text x="360" y="178" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Required for high-risk, irreversible, or regulated operations</text>
</svg>
